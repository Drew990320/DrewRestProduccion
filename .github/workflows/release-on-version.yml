# Se publica dentro de DrewRestProduccion/.github/workflows/
# Al subir VERSION.json a main, crea un GitHub Release (tag = v{version})
# con VERSION.json como asset. El launcher lee /releases/latest (sin caché de raw/main).

name: Release DrewRest

on:
  push:
    branches: [main]
    paths:
      - VERSION.json
      - .github/workflows/release-on-version.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Leer VERSION.json
        id: ver
        run: |
          set -euo pipefail
          test -f VERSION.json
          VERSION=$(jq -r '.version // empty' VERSION.json)
          BUILD=$(jq -r '.buildId // empty' VERSION.json)
          DATE=$(jq -r '.buildDate // empty' VERSION.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "VERSION.json sin campo version" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          {
            echo "version=${VERSION}"
            echo "build=${BUILD}"
            echo "tag=${TAG}"
            echo "title=DrewRest ${VERSION} (${BUILD})"
          } >> "$GITHUB_OUTPUT"

      - name: Empaquetar update slim (sin node_modules / pgsql / data local)
        run: |
          set -euo pipefail
          # Paquete de actualización: lo esencial. node_modules se regenera en el PC destino.
          # Sin esto, el ZIP de la rama (~1.5GB) falla en PCs sin Git.
          STAGE="${RUNNER_TEMP}/drewrest-slim"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          rsync -a \
            --exclude '.git/' \
            --exclude 'api/node_modules/' \
            --exclude 'api/logs/' \
            --exclude 'vendor/pgsql/' \
            --exclude 'vendor/pgsql18/' \
            --exclude 'data/postgres/' \
            --exclude 'data/backups/' \
            --exclude 'data/staging/' \
            --exclude 'data/state/' \
            ./ "$STAGE/"
          # Marca para que el cliente sepa que debe npm install
          echo '{"slim":true,"needsNpmInstall":true}' > "$STAGE/UPDATE-SLIM.json"
          (cd "$STAGE" && zip -r -q "$GITHUB_WORKSPACE/DrewRest-update.zip" .)
          ls -lh "$GITHUB_WORKSPACE/DrewRest-update.zip"

      - name: Crear o actualizar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.title }}
          body: |
            Actualización on-prem DrewRest `${{ steps.ver.outputs.version }}` (build `${{ steps.ver.outputs.build }}`).

            Asset `DrewRest-update.zip`: paquete slim (sin node_modules; se reinstalan en destino).

            En el PC del restaurante: **Detener** → Actualizar → Descargar e instalar
            (o `DrewRest.exe actualizar`). Sin Git usa el ZIP del Release.
          files: |
            VERSION.json
            DrewRest-update.zip
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
